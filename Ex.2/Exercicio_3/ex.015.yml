info:
  name: ex.015
  type: http

http:
  method: GET
  url: https://rickandmortyapi.com/api/character/?gender=female&status=alive&page=2
  params:
    - name: gender
      value: female
      type: query
    - name: status
      value: alive
      type: query
    - name: page
      value: "2"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
